<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripMate AI - 회원가입</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#ffdbcf",
                        "primary": "#00658d",
                        "on-surface-variant": "#3e4850",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#5b4300",

                        "tertiary": "#785900",
                        "secondary": "#a43c12",
                        "outline-variant": "#bdc8d1",
                        "tertiary-fixed": "#ffdf9e",
                        "secondary-fixed-dim": "#ffb59c",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#82cfff",
                        "inverse-on-surface": "#f0f1f2",
                        "surface": "#f8f9fa",
                        "error": "#ba1a1a",
                        "surface-tint": "#00658d",
                        "surface-container-highest": "#e1e3e4",
                        "on-primary-fixed-variant": "#004c6b",
                        "outline": "#6e7881",
                        "on-secondary-fixed-variant": "#822800",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#380c00",
                        "background": "#f8f9fa",
                        "primary-container": "#00aeef",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-container": "#4a3600",
                        "on-surface": "#191c1d",
                        "on-primary-container": "#003e58",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#c6e7ff",
                        "on-tertiary-fixed": "#261a00",
                        "surface-container-high": "#e7e8e9",
                        "inverse-surface": "#2e3132",
                        "tertiary-container": "#ce9b00",
                        "surface-container": "#edeeef",
                        "secondary-container": "#fe7e4f",

                        "on-background": "#191c1d",
                        "surface-dim": "#d9dadb",
                        "surface-container-low": "#f3f4f5",
                        "primary-fixed-dim": "#82cfff",
                        "surface-bright": "#f8f9fa",
                        "on-primary-fixed": "#001e2d",
                        "on-secondary-container": "#6b1f00"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "base": "4px",
                        "margin-desktop": "64px",
                        "max-width-content": "1200px",
                        "xs": "4px",
                        "xl": "32px",
                        "md": "16px",
                        "lg": "24px",
                        "sm": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],

                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]

                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .shimmer {
            background: linear-gradient(90deg, #f1f3f5 25%, #e1e3e4 50%, #f1f3f5 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .auth-card {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }
    </style>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
