# ===== Netlify 배포 설정 =====
# 현재: 정적 HTML 임시 페이지 배포
# 추후: React + Vite 빌드 배포로 전환 예정

[functions]
  directory = "netlify/functions"

[build]
  command = "npm run build"
  publish = "dist"

# API 요청을 Netlify Functions로 포워딩
[[redirects]]
  from = "/api/generate-plan"
  to = "/.netlify/functions/generate-plan"
  status = 200

[[redirects]]
  from = "/api/geocode"
  to = "/.netlify/functions/geocode"
  status = 200

# SPA 라우팅 지원 - 모든 경로를 index.html로 리다이렉트
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 보안 헤더 설정
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# 캐시 설정 - HTML은 항상 최신 버전
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"